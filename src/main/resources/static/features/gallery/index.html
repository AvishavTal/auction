<!--
  ============================================================================
  Auction Gallery View Template
  ============================================================================

  @file index.html
  @module gallery
  @description Main view for browsing live auction items. Features search,
               category/price filtering, sorting controls, dynamic grid
               rendering for listings, and navigation for new item publication.
  @dependencies
    - Stylesheets: ../../shared/css/global.css, ./gallery.css
    - Scripts: ./gallery.js (ES Module)
-->
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auction Gallery | Auction System</title>

    <!-- Global Framework & View-Specific Stylesheets -->
    <link rel="stylesheet" href="../../shared/css/global.css">
    <link rel="stylesheet" href="gallery.css">
</head>
<body>
    
    <!-- Dynamic Navigation Bar Insertion Point (Populated via layout.js) -->
    <div id="navbar-placeholder"></div>

    <!-- Main Content Layout Container -->
    <main class="gallery-container">

        <!-- Gallery Section Header & Publication Controls -->
        <header class="gallery-header">
            <h2> גלריית מכירות</h2>
            <div class="header-actions">
                <button onclick="location.href='../publish-item/index.html'" class="btn-publish">+ פרסם מוצר חדש למכירה</button>
            </div>
        </header>

        <!-- Search, Category Filter, Price Range & Sorting Toolbar -->
        <section class="filters-bar">
            <input type="text" id="searchInput" placeholder="חיפוש חופשי של מוצר...">
            
            <select id="categoryFilter">
                <option value="">כל הקטגוריות</option>
            </select>
            
            <select id="priceFilter">
                <option value="">כל המחירים</option>
                <option value="under100">עד 100 ש"ח</option>
                <option value="100to500">100 – 500 ש"ח</option>
                <option value="over500">מעל 500 ש"ח</option>
            </select>
            
            <select id="sortFilter">
                <option value="closingSoon">מיון: הקרוב לסיום</option>
            </select>
        </section>

        <!-- Dynamic Product Listing Grid Container -->
        <section id="itemsGrid" class="items-grid">
            <p class="loading-status">טוען מכרזים...</p>
        </section>
        
    </main>

    <!-- Client-Side Controller Integration Module -->
    <script type="module" src="gallery.js"></script>
</body>
</html>

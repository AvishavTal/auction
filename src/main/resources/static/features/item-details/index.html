<!--
  ============================================================================
  Item Details & Bidding View Template
  ============================================================================

  @file index.html
  @module item-details
  @description Main view for detailed item specifications, live countdown tracking,
               watchlist toggling, manual and proxy bid submission, and recent
               bidding history audit log display.
  @dependencies
    - Stylesheets: ../../shared/css/global.css, ./item.css
    - Scripts: ./item.js (ES Module)
-->
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Details | Auction System</title>

    <!-- Global Framework & View-Specific Stylesheets -->
    <link rel="stylesheet" href="../../shared/css/global.css">
    <link rel="stylesheet" href="item.css">
</head>
<body>
    
    <!-- Dynamic Navigation Bar Insertion Point (Populated via layout.js) -->
    <div id="navbar-placeholder"></div>

    <!-- Main Item Details Layout Container -->
    <main class="item-details-layout">
        
        <!-- View Section Header -->
        <header class="section-header">
            <h2> דף מוצר והגשת הצעה</h2>
        </header>

        <!-- Product Overview Grid: Specifications & Visual Media -->
        <section class="product-info-grid">
            
            <!-- Textual Specifications, Timer & Price Information -->
            <div class="product-text">
                <h1 id="itemTitle">Loading Product...</h1>
                <p class="description-block">
                    <strong>תיאור:</strong>
                    <span id="itemDescription"></span>
                </p>
                <div class="timer-block">
                    <p>זמן לסיום: <span id="countdown" class="timer-red">--:--:--</span></p>
                    <small>(הצעה בדקות האחרונות תאריך את המכירה)</small>
                </div>
                <div class="price-block">
                    מחיר נוכחי: <span id="currentPrice">0</span> ש"ח
                </div>
                <button id="watchlistBtn" class="btn-watchlist">⭐ הוסף לרשימת מעקב</button>
            </div>

            <!-- Visual Media Frame Container -->
            <div class="product-visual">
                <img id="itemImage" src="../../shared/components/placeholder.png" alt="Product Image">
            </div>
        </section>

        <!-- Bid Submission Section (Manual & Proxy Bidding) -->
        <section class="bidding-section">
            <h3>הגשת הצעה למכירה:</h3>
            
            <!-- Contextual Status / Error Alert Container -->
            <div id="uiMessage" class="ui-message"></div>
            
            <form id="bidForm" class="bid-form">
                <div class="input-row">
                    <div class="input-group">
                        <label for="manualAmount">סכום הצעה ידנית:</label>
                        <input type="number" id="manualAmount" min="0" step="1">
                    </div>
                    <div class="input-group">
                        <label for="proxyAmount">מקסימום להצעה אוטומטית (Proxy):</label>
                        <input type="number" id="proxyAmount" min="0" step="1">
                    </div>
                </div>
                <button type="submit" id="submitBidBtn" class="btn-bid">בצע הצעה</button>
            </form>
        </section>

        <!-- Audit Log: Recent Bidding History Table -->
        <section class="history-section">
            <h3>5 הצעות אחרונות:</h3>
            <table class="bids-table">
                <thead>
                    <tr>
                        <th>מציע</th>
                        <th>סכום</th>
                        <th>זמן</th>
                    </tr>
                </thead>
                <tbody id="bidsHistoryTable">
                    <tr><td colspan="3" style="text-align:center;">אין הצעות עדיין</td></tr>
                </tbody>
            </table>
        </section>
    </main>

    <!-- Client-Side Item Controller Module -->
    <script type="module" src="item.js"></script>
</body>
</html>
